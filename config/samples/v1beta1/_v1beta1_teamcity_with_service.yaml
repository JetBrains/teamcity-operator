# TeamCity with headless service + per-node serviceName (new deployment).
#
# Demonstrates spec.serviceList (clusterIP: None) and spec.*.serviceName so each
# StatefulSet pod gets a stable DNS name under the headless service.
#
# Use this when creating a TeamCity that already includes serviceName. For adding
# or changing serviceName on an existing deployment, see
# _v1beta1_teamcity_with_service_name_recreate.yaml (requires allow-sts-recreate).
#
# Apply:
#   kubectl apply -f config/samples/v1beta1/_v1beta1_teamcity_with_service.yaml
apiVersion: jetbrains.com/v1beta1
kind: TeamCity
metadata:
  name: teamcity-sample-with-svc
  namespace: default
  finalizers:
    - "teamcity.jetbrains.com/finalizer"
spec:
  image: jetbrains/teamcity-server
  persistentVolumeClaims:
    - name: teamcity-node-config-dir
      volumeMount:
        name: teamcity-node-config-dir
        mountPath: /storage/config
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  serviceList:
    - name: tc-sample-one-svc
      spec:
        selector:
          app.kubernetes.io/name: teamcity-sample-with-svc
          app.kubernetes.io/component: teamcity-server
          app.kubernetes.io/part-of: teamcity
        ports:
          - protocol: TCP
            port: 8111
            targetPort: 8111
        clusterIP: None
  mainNode:
    name: node
    spec:
      serviceName: tc-sample-one-svc
      env:
        - name: AWS_DEFAULT_REGION
          value: "eu-west-1"
      requests:
        cpu: "400m"
        memory: "1000Mi"
      responsibilities: [ "MAIN_NODE", "CAN_PROCESS_USER_DATA_MODIFICATION_REQUESTS" ]
  secondaryNodes:
    - name: secondary-node
      spec:
        serviceName: tc-sample-one-svc
        requests:
          cpu: "400m"
          memory: "1000Mi"
        responsibilities: ["CAN_PROCESS_BUILD_MESSAGES", "CAN_CHECK_FOR_CHANGES", "CAN_PROCESS_BUILD_TRIGGERS"]
  dataDirVolumeClaim:
    name: teamcity-node-volume1
    volumeMount:
      name: teamcity-node-volume1
      mountPath: /storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
