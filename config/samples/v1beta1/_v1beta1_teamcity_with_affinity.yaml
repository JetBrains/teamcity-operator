# TeamCity with pod affinity on the main node.
#
# Sets spec.mainNode.spec.affinity (required nodeAffinity for arm64, preferred for linux).
# Use this pattern to pin or prefer nodes with specific labels, taints, or topology.
#
# Apply:
#   kubectl apply -f config/samples/v1beta1/_v1beta1_teamcity_with_affinity.yaml
apiVersion: jetbrains.com/v1beta1
kind: TeamCity
metadata:
  name: teamcity-with-affinity
  namespace: default
  finalizers:
    - "teamcity.jetbrains.com/finalizer"
spec:
  image: jetbrains/teamcity-server
  mainNode:
    name: main-node
    spec:
      requests:
        cpu: "900m"
        memory: "1512Mi"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
  dataDirVolumeClaim:
    name: teamcity-with-affinity-datadir
    volumeMount:
      name: teamcity-with-affinity-datadir
      mountPath: /storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
