# TeamCity with a dedicated ServiceAccount.
#
# spec.serviceAccount creates (or references) a ServiceAccount for TeamCity pods,
# including optional cloud IAM annotations (EKS IRSA example below).
#
# Apply:
#   kubectl apply -f config/samples/v1beta1/_v1beta1_teamcity_with_serviceaccount.yaml
apiVersion: jetbrains.com/v1beta1
kind: TeamCity
metadata:
  name: teamcity-sample-with-sa
  namespace: default
  finalizers:
    - "teamcity.jetbrains.com/finalizer"
spec:
  image: jetbrains/teamcity-server
  serviceAccount:
    name: teamcity-service-account
    annotations:
      eks.amazonaws.com/role-arn: some-role
  mainNode:
    name: node
    spec:
      env:
        - name: AWS_DEFAULT_REGION
          value: "eu-west-1"
      requests:
        cpu: "400m"
        memory: "1000Mi"
  dataDirVolumeClaim:
    name: teamcity-node-volume1
    volumeMount:
      name: teamcity-node-volume1
      mountPath: /storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
