# TeamCity with nodeSelector on the main node.
#
# Sets spec.mainNode.spec.nodeSelector to schedule the main node pod onto nodes
# matching the given labels (kubernetes.io/os: linux in this example).
#
# Apply:
#   kubectl apply -f config/samples/v1beta1/_v1beta1_teamcity_with_node_selector.yaml
apiVersion: jetbrains.com/v1beta1
kind: TeamCity
metadata:
  name: teamcity-sample-with-node-selector
  namespace: default
  finalizers:
    - "teamcity.jetbrains.com/finalizer"
spec:
  image: jetbrains/teamcity-server
  mainNode:
   name: main-node
   spec:
    env:
      - name: AWS_DEFAULT_REGION
        value: "eu-west-1"
    requests:
      cpu: "1000m"
      memory: "2500Mi"
    nodeSelector:
      kubernetes.io/os: linux
  dataDirVolumeClaim:
    name: teamcity-node-volume1
    volumeMount:
      name: teamcity-node-volume1
      mountPath: /storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi

