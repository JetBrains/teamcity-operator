# TeamCity with headless service + per-node serviceName.
#
# Use this sample when adding or changing spec.*.serviceName on a TeamCity that is
# already running (StatefulSet already exists without that serviceName).
#
# Kubernetes treats StatefulSet.spec.serviceName as immutable. The operator therefore
# requires an explicit opt-in before it deletes and recreates affected StatefulSets:
#
#   metadata.annotations.teamcity.jetbrains.com/allow-sts-recreate: "true"
#
# Workflow for an existing deployment:
#   1. kubectl annotate teamcity <name> teamcity.jetbrains.com/allow-sts-recreate=true
#   2. kubectl patch/edit the TeamCity and set spec.mainNode.spec.serviceName (and/or secondary)
#   3. The operator recreates the StatefulSet(s) and restarts the node(s)
#
# For a brand-new TeamCity created with serviceName already set, the annotation is not required.
#
# Apply:
#   kubectl apply -f config/samples/v1beta1/_v1beta1_teamcity_with_service_name_recreate.yaml
apiVersion: jetbrains.com/v1beta1
kind: TeamCity
metadata:
  name: teamcity-sample-with-svc-recreate
  namespace: default
  annotations:
    teamcity.jetbrains.com/allow-sts-recreate: "true"
  finalizers:
    - "teamcity.jetbrains.com/finalizer"
spec:
  image: jetbrains/teamcity-server
  persistentVolumeClaims:
    - name: teamcity-node-config-dir
      volumeMount:
        name: teamcity-node-config-dir
        mountPath: /storage/config
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  serviceList:
    - name: tc-sample-recreate-svc
      spec:
        selector:
          app.kubernetes.io/name: teamcity-sample-with-svc-recreate
          app.kubernetes.io/component: teamcity-server
          app.kubernetes.io/part-of: teamcity
        ports:
          - protocol: TCP
            port: 8111
            targetPort: 8111
        clusterIP: None
  mainNode:
    name: node
    spec:
      serviceName: tc-sample-recreate-svc
      env:
        AWS_DEFAULT_REGION: "eu-west-1"
      requests:
        cpu: "400m"
        memory: "1000Mi"
      responsibilities: [ "MAIN_NODE", "CAN_PROCESS_USER_DATA_MODIFICATION_REQUESTS" ]
  secondaryNodes:
    - name: secondary-node
      spec:
        serviceName: tc-sample-recreate-svc
        requests:
          cpu: "400m"
          memory: "1000Mi"
        responsibilities: ["CAN_PROCESS_BUILD_MESSAGES", "CAN_CHECK_FOR_CHANGES", "CAN_PROCESS_BUILD_TRIGGERS"]
  dataDirVolumeClaim:
    name: teamcity-node-volume1
    volumeMount:
      name: teamcity-node-volume1
      mountPath: /storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
