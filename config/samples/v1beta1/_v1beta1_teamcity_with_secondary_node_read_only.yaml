# Multi-node TeamCity: secondary node without responsibilities (read-only).
#
# Deploys a main node plus a secondary node that omits spec.responsibilities.
# The secondary joins the cluster but does not take on build or UI workload roles.
# Includes databaseSecret for an external/shared database.
#
# Apply:
#   kubectl apply -f config/samples/v1beta1/_v1beta1_teamcity_with_secondary_node_read_only.yaml
apiVersion: jetbrains.com/v1beta1
kind: TeamCity
metadata:
  name: teamcity-sample-with-secondary-node-read-only
  namespace: default
  finalizers:
    - "teamcity.jetbrains.com/finalizer"
spec:
  image: jetbrains/teamcity-server
  startupPropertiesConfig:
    teamcity.startup.maintenance: "false"
    teamcity.firstStart.setupAdmin.enabled: "false"
    teamcity.superUser.token: "token123"
  databaseSecret:
    secret: database-properties
  dataDirVolumeClaim:
    name: teamcity-node-volume1
    volumeMount:
      name: teamcity-node-volume1
      mountPath: /storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
  mainNode:
    name: main-node
    spec:
      requests:
        cpu: "1000m"
        memory: "2500Mi"
  secondaryNodes:
    - name: secondary-node
      spec:
        requests:
          cpu: "1000m"
          memory: "2500Mi"
